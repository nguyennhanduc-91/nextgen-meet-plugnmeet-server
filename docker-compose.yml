version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: tn_root_secure_password_2026
      MYSQL_DATABASE: plugnmeet
      MYSQL_USER: tn_plugnmeet_user
      MYSQL_PASSWORD: tn_db_password_2026
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped

  nats:
    image: nats:2.12-alpine
    command:
      - "-DVV"
      - "-config"
      - "/app/nats-server.conf" # Gọi file cấu hình từ shared volume
    ports:
      - "4222:4222"
    volumes:
      # Chúng ta sẽ mount thư mục app từ plugnmeet-server sang nats
      - shared-app-vol:/app
      - nats-data:/data/jetstream
    restart: unless-stopped

  etherpad:
    image: mynaparrot/plugnmeet-etherpad
    restart: unless-stopped

  plugnmeet-server:
    # BÍ QUYẾT: Yêu cầu Coolify build image từ Dockerfile ở thư mục hiện tại
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - mariadb
    volumes:
      # Copy toàn bộ nội dung /app ra volume dùng chung
      - shared-app-vol:/app
      - plugnmeet-upload:/app/upload
    environment:
      - LD_LIBRARY_PATH=/app/lib
    expose:
      - "8080"
    restart: unless-stopped

  plugnmeet-client:
    image: nginx:alpine
    depends_on:
      - plugnmeet-server
      - nats
    volumes:
      # Đọc code frontend trực tiếp từ Volume do plugnmeet-server chia sẻ
      - shared-app-vol:/app
    command: >
      /bin/sh -c "
      echo 'server { 
        listen 80; 
        root /app/client/dist; 
        index index.html; 
        location / { 
          try_files \$$uri /index.html; 
        } 
        location /nats {
          proxy_pass http://nats:8222;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$$http_upgrade;
          proxy_set_header Connection \"Upgrade\";
          proxy_set_header Host \$$host;
        }
      }' > /etc/nginx/conf.d/default.conf &&
      nginx -g 'daemon off;'
      "
    expose:
      - "80"
    restart: unless-stopped

volumes:
  mariadb-data:
  nats-data:
  plugnmeet-upload:
  # Volume dùng chung để plugnmeet-server chia sẻ file config và frontend cho NATS và Nginx
  shared-app-vol:
