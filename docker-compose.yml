version: '3.8'

services:
  # ==========================================
  # 1. DATABASE LƯU TRỮ
  # ==========================================
  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: tn_root_secure_password_2026
      MYSQL_DATABASE: plugnmeet
      MYSQL_USER: tn_plugnmeet_user
      MYSQL_PASSWORD: tn_db_password_2026
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped

  # ==========================================
  # 2. HỆ THỐNG TRUYỀN TIN (NATS)
  # ==========================================
  nats:
    image: nats:2.12-alpine
    command:
      - /bin/sh
      - -c
      - |
        mkdir -p /etc/nats
        cat << 'EOF' > /etc/nats/nats-server.conf
        port: 4222
        websocket {
            port: 8222
            no_tls: true
        }
        jetstream: {
            store_dir: /data/jetstream
        }
        accounts {
            SYS: {
                exports: [ { stream: "$$SYS.ACCOUNT.PNM.>", accounts: [PNM] } ]
            }
            PNM: {
                jetstream: enabled
                imports: [ { stream: { account: SYS, subject: "$$SYS.ACCOUNT.PNM.>" } } ]
                users: [ { nkey: UD4JADBMDSQCA5D475KSMFV43TAINASJ3TIEFQ7LP43XENPMQYFTRFKP } ]
            }
        }
        system_account: SYS
        authorization {
            timeout: 5
            auth_callout {
                issuer: AD7EHM6WBIVERNVY6K7T3QEL62EB2BNMK4TTHXTUHTYSJGS3SZFZ4HX5
                auth_users: [ UD4JADBMDSQCA5D475KSMFV43TAINASJ3TIEFQ7LP43XENPMQYFTRFKP ]
                account: PNM
                xkey: XAVXJLXWZR7W24SAOPN6YATDOF2B6URA4GMBKYM7SBQIFO4O6OLQKSZB
            }
        }
        EOF
        exec nats-server -config /etc/nats/nats-server.conf
    volumes:
      # ÉP LÀM MỚI DỮ LIỆU LẦN CUỐI
      - nats_data_final_v5:/data/jetstream
    restart: unless-stopped

  # ==========================================
  # 3. LÕI XỬ LÝ (PLUGNMEET SERVER v2.1.6)
  # ==========================================
  plugnmeet-server:
    image: mynaparrot/plugnmeet-server:v2.1.6
    depends_on:
      - mariadb
      - nats
    volumes:
      - frontend-dist:/app/client/dist
      - plugnmeet-upload:/app/upload
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "1. Dang tao thu muc /app va file cau hinh config.yaml..."
        mkdir -p /app
        cd /app
        cat << 'EOF' > config.yaml
        app_info:
          auth_header_token: "TN_Admin_Key_2026"
          secret: "TN_Secret_Key_Super_Secure_2026"
        client:
          path: "/app/client/dist"
          port: 8080
          debug: false
        room_default_settings:
          max_duration: 0
          max_participants: 0
          max_num_breakout_rooms: 6
        livekit_info:
          host: "wss://livekit.thanhnguyen.group"
          api_key: "API_nextgen_admin_key"
          secret: "SEC_thanhnguyen_group_super_secure_9999"
        redis_info:
          host: "194.233.84.253:6379"
          username: ""
          password: "fE0RUoc9Y7vvUReP2bgoNgN7mwYMZ3fILM1vRGLo1kzwJOKOLT5V0ovdY3jY8v8c"
          dbname: 0
          use_tls: false
        database_info:
          driver_name: "mysql"
          host: "mariadb"
          port: 3306
          username: "tn_plugnmeet_user"
          password: "tn_db_password_2026"
          db: "plugnmeet"
        nats_info:
          nats_urls: ["nats://nats:4222"]
          nats_ws_urls: ["wss://meet.thanhnguyen.group/nats"]
          account: PNM
          nkey: "SUAGSRI6D537QEHEK7G5KAN4KINSL77FTRTAJGA2KTFRR7AIOMA43P4PRE"
          auth_callout_issuer_private: "SAAMTMBUANSRW3XDXZBIBF4JYRRUMWGV2GZT5MQ54VNWNRPN2Y4J46NQSA"
          auth_callout_xkey_private: "SXAMBYY64TKXZCLFQGWDATGPIPURA4SIV3GDCSGG7A74USK6XDO6WQTIUU"
          num_replicas: 1
          # FIX CẤU TRÚC PHẲNG CHO v2.1.6
          room_stream_name: "pnmrooms"
          project_info_kv_name: "pnmproj"
          recorder_info_kv_name: "pnmrec"
          subjects:
            system_api_worker: "sysApiWorker"
            system_js_worker: "sysJsWorker"
            system_core_worker: "sysCoreWorker"
            system_public: "sysPublic"
            system_private: "sysPrivate"
            chat: "chat"
            whiteboard: "whiteboard"
            data_channel: "dataChannel"
        upload_file_settings:
          path: "/app/upload"
          max_size: 50
          max_size_whiteboard_file: 30
          keep_forever: false
          allowed_types: ["jpg","png","jpeg","svg","pdf","docx","txt","xlsx","pptx","zip","mp4","webm","mp3"]
        shared_notepad:
          enabled: false
        recorder_info:
          recording_files_path: "/app/upload"
        EOF
        
        echo "2. Doi MariaDB va NATS khoi tao an toan..."
        sleep 10
        echo "3. Khoi dong Server..."
        exec /usr/local/bin/docker-entrypoint.sh plugnmeet-server -config /app/config.yaml
    expose:
      - "8080"
    restart: unless-stopped

  # ==========================================
  # 4. GIAO DIỆN (NGINX CLIENT v2.1.7 + UI TỐI GIẢN)
  # ==========================================
  plugnmeet-client:
    image: nginx:alpine
    depends_on:
      - plugnmeet-server
    volumes:
      - frontend-dist:/usr/share/nginx/html/room
    command:
      - /bin/sh
      - -c
      - |
        echo "1. Cai dat cong cu..."
        apk add --no-cache wget unzip
        rm -rf /usr/share/nginx/html/*
        mkdir -p /usr/share/nginx/html/room
        wget -qO /tmp/client.zip https://github.com/mynaparrot/plugNmeet-client/releases/download/v2.1.7/client.zip
        unzip -o /tmp/client.zip -d /tmp/ext
        cp -rf /tmp/ext/client/dist/* /usr/share/nginx/html/room/
        rm -f /usr/share/nginx/html/room/login.html
        
        echo "2. Tao GIAO DIEN TRANG CHU MOI..."
        cat << 'EOFHTML' > /usr/share/nginx/html/index.html
        <!DOCTYPE html>
        <html lang="vi">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>NextGen Meet - Thanh Nguyen Group</title>
            <style>
                body { font-family: 'Segoe UI', sans-serif; background-color: #0b0f19; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
                .login-box { background-color: #111827; padding: 40px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); width: 90%; max-width: 400px; text-align: center; border: 1px solid #1f2937; }
                .logo { max-width: 180px; margin-bottom: 24px; }
                .input-group { margin-bottom: 20px; text-align: left; }
                input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #374151; background-color: #1f2937; color: white; box-sizing: border-box; width: 100%; outline: none; }
                button { width: 100%; padding: 14px; border-radius: 8px; background-color: #2563eb; color: white; font-weight: bold; cursor: pointer; border: none; }
                #error-msg { color: #ef4444; margin-top: 16px; display: none; }
            </style>
        </head>
        <body>
            <div class="login-box">
                <img src="https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png" alt="Logo" class="logo">
                <h2>Vào Phòng Họp</h2>
                <div class="input-group"><input type="text" id="userName" placeholder="Tên của bạn"></div>
                <div class="input-group"><input type="text" id="roomName" value="NextGen-Room"></div>
                <button onclick="joinRoom()" id="joinBtn">Kết Nối Ngay</button>
                <div id="error-msg"></div>
            </div>
            <script>
                async function joinRoom() {
                    const btn = document.getElementById('joinBtn');
                    const errorMsg = document.getElementById('error-msg');
                    const name = document.getElementById('userName').value.trim();
                    const room = document.getElementById('roomName').value.trim();
                    if(!name || !room) return;
                    btn.innerText = "Đang kết nối..."; btn.disabled = true;
                    try {
                        const res = await fetch('/auth/room/getJoinToken', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'API-KEY': 'TN_Admin_Key_2026', 'API-SECRET': 'TN_Secret_Key_Super_Secure_2026' },
                            body: JSON.stringify({ room_id: room, user_info: { name: name, user_id: "u_"+Date.now(), is_admin: true } })
                        });
                        const data = await res.json();
                        if(data.status) { window.location.href = "/room/?access_token=" + data.token; }
                        else { errorMsg.innerText = data.msg; errorMsg.style.display = "block"; btn.innerText = "Kết Nối Ngay"; btn.disabled = false; }
                    } catch(e) { errorMsg.innerText = "Server chưa sẵn sàng!"; errorMsg.style.display = "block"; btn.disabled = false; }
                }
            </script>
        </body>
        </html>
        EOFHTML

        chmod -R 755 /usr/share/nginx/html
        
        echo "3. Cau hinh Nginx Proxy..."
        cat << 'EOF' > /etc/nginx/conf.d/default.conf
        server { 
          listen 80; 
          root /usr/share/nginx/html; 
          index index.html; 
          location / { try_files $$uri $$uri/ /index.html; }
          location /room/ { try_files $$uri $$uri/ /room/index.html; }
          location /auth/ {
            proxy_pass http://plugnmeet-server:8080/auth/;
            proxy_set_header Host $$host;
            proxy_set_header X-Real-IP $$remote_addr;
          }
          location /nats {
            proxy_pass http://nats:8222;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $$http_upgrade;
            proxy_set_header Connection "Upgrade";
          }
        }
        EOF
        exec nginx -g 'daemon off;'
    expose:
      - "80"
    restart: unless-stopped

volumes:
  mariadb-data:
  frontend-dist:
  # VOLUME MỚI HOÀN TOÀN ĐỂ XÓA LỖI CŨ
  nats_data_final_v5:
  plugnmeet-upload:
