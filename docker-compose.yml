version: '3.8'

services:
  # ==========================================
  # 1. DATABASE LƯU TRỮ
  # ==========================================
  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: tn_root_secure_password_2026
      MYSQL_DATABASE: plugnmeet
      MYSQL_USER: tn_plugnmeet_user
      MYSQL_PASSWORD: tn_db_password_2026
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped

  # ==========================================
  # 2. LÕI XỬ LÝ (PLUGNMEET SERVER v2.1.6)
  # ==========================================
  plugnmeet-server:
    image: mynaparrot/plugnmeet-server:v2.1.6
    depends_on:
      - mariadb
    volumes:
      # BẮC CẦU: Nhận file CSS/JS từ Nginx truyền sang
      - frontend-dist:/app/client/dist
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "1. Dang tao thu muc /app va file cau hinh config.yaml..."
        mkdir -p /app
        cd /app
        cat << 'EOF' > config.yaml
        client:
          path: "/app/client/dist"
          port: 8080
          debug: false
          api_key: "TN_Admin_Key_2026"
          secret: "TN_Secret_Key_Super_Secure_2026"
        livekit_info:
          host: "wss://livekit.thanhnguyen.group"
          api_key: "API_nextgen_admin_key"
          secret: "SEC_thanhnguyen_group_super_secure_9999"
        redis_info:
          # FIX LỖI "missing port in address": Gộp IP và Cổng vào chung trường host
          host: "194.233.84.253:6379"
          username: ""
          password: "fE0RUoc9Y7vvUReP2bgoNgN7mwYMZ3fILM1vRGLo1kzwJOKOLT5V0ovdY3jY8v8c"
          dbname: 0
          use_tls: false
        database_info:
          driver_name: "mysql"
          host: "mariadb"
          port: 3306
          username: "tn_plugnmeet_user"
          password: "tn_db_password_2026"
          db: "plugnmeet"
        EOF
        
        echo "2. Doi MariaDB khoi tao an toan..."
        sleep 10
        
        echo "3. Dang cho Nginx tai va giai nen xong CSS..."
        # Vòng lặp chờ an toàn: Nếu Frontend chưa có CSS thì Server đứng đợi
        while [ ! -d "/app/client/dist/assets/css" ]; do
          sleep 2
        done
        
        echo "4. Da nhan duoc CSS! Nap AI va khoi dong Server..."
        exec /usr/local/bin/docker-entrypoint.sh plugnmeet-server -config /app/config.yaml
    expose:
      - "8080"
    restart: unless-stopped

  # ==========================================
  # 3. GIAO DIỆN (NGINX CLIENT v2.1.7)
  # ==========================================
  plugnmeet-client:
    image: nginx:alpine
    volumes:
      # BẮC CẦU: Đưa file giải nén vào vùng dùng chung
      - frontend-dist:/usr/share/nginx/html
    command:
      - /bin/sh
      - -c
      - |
        echo "1. Cai dat cong cu giai nen..."
        apk add --no-cache wget unzip
        echo "2. Tai Client v2.1.7 tinh tu GitHub..."
        wget -qO /tmp/client.zip https://github.com/mynaparrot/plugNmeet-client/releases/download/v2.1.7/client.zip
        unzip -o /tmp/client.zip -d /tmp/ext
        
        echo "3. Xoa trang giao dien mac dinh va dua code moi vao Nginx..."
        rm -rf /usr/share/nginx/html/*
        cp -rf /tmp/ext/client/dist/* /usr/share/nginx/html/
        
        echo "4. Cau hinh API Server..."
        echo 'window.PLUGNMEET_SERVER_URL = "https://api-meet.thanhnguyen.group";' > /usr/share/nginx/html/config.js
        mkdir -p /usr/share/nginx/html/assets/imgs
        echo 'window.PLUGNMEET_SERVER_URL = "https://api-meet.thanhnguyen.group";' > /usr/share/nginx/html/assets/config.js
        
        echo "5. Cau hinh Nginx Routing..."
        echo 'server { listen 80; root /usr/share/nginx/html; index index.html; location / { try_files $$uri /index.html; } }' > /etc/nginx/conf.d/default.conf
        
        echo "6. Tai Logo thuong hieu Thanh Nguyen Group..."
        wget -qO /usr/share/nginx/html/assets/imgs/main-logo-dark.png 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true
        wget -qO /usr/share/nginx/html/assets/imgs/main-logo-light.png 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true
        wget -qO /usr/share/nginx/html/favicon.ico 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true
        
        echo "HOAN TAT! Dang bat giao dien Web..."
        exec nginx -g 'daemon off;'
    expose:
      - "80"
    restart: unless-stopped

# Khai báo các Volume dùng chung
volumes:
  mariadb-data:
  frontend-dist:
