version: '3.8'

services:
  # 1. DATABASE LƯU TRỮ
  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: tn_root_secure_password_2026
      MYSQL_DATABASE: plugnmeet
      MYSQL_USER: tn_plugnmeet_user
      MYSQL_PASSWORD: tn_db_password_2026
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped

  # 2. LÕI XỬ LÝ LOGIC (PLUGNMEET SERVER)
  plugnmeet-server:
    image: mynaparrot/plugnmeet-server:v2.1.6
    depends_on:
      - mariadb
    volumes:
      # SỬ DỤNG TÊN FILE KHÁC Ở NGOÀI ĐỂ TRÁNH LỖI CACHE DIRECTORY
      - ./config.yaml:/app/config.yaml
    environment:
      # BẮT BUỘC: Khai báo để nạp thư viện AI Microsoft Speech
      - LD_LIBRARY_PATH=/app/lib
    # CHUẨN HÃNG: Gọi binary và trỏ file config
    command: ["plugnmeet-server", "-config", "/app/config.yaml"]
    expose:
      - "8080"
    restart: unless-stopped

  # 3. GIAO DIỆN NGƯỜI DÙNG (NGINX CLIENT v2.1.7)
  plugnmeet-client:
    image: nginx:alpine
    command: >
      /bin/sh -c "
      apk add --no-cache wget unzip &&
      wget -qO /tmp/client.zip https://github.com/mynaparrot/plugNmeet-client/releases/download/v2.1.7/plugnmeet-client.zip &&
      unzip -o /tmp/client.zip -d /tmp/ext &&
      cp -rf /tmp/ext/* /usr/share/nginx/html/ &&
      echo 'window.PLUGNMEET_SERVER_URL = \"https://api-meet.thanhnguyen.group\";' > /usr/share/nginx/html/config.js &&
      mkdir -p /usr/share/nginx/html/assets/imgs &&
      echo 'window.PLUGNMEET_SERVER_URL = \"https://api-meet.thanhnguyen.group\";' > /usr/share/nginx/html/assets/config.js &&
      echo 'server { listen 80; root /usr/share/nginx/html; index index.html; location / { try_files \$$uri /index.html; } }' > /etc/nginx/conf.d/default.conf &&
      wget -qO /usr/share/nginx/html/assets/imgs/main-logo-dark.png 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true &&
      wget -qO /usr/share/nginx/html/assets/imgs/main-logo-light.png 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true &&
      wget -qO /usr/share/nginx/html/favicon.ico 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true &&
      nginx -g 'daemon off;'
      "
    expose:
      - "80"
    restart: unless-stopped

volumes:
  mariadb-data:
