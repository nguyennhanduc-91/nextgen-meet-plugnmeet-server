version: '3.8'

services:
  # 1. Server NATS (Đã đổi sang tự Build)
  nats-server:
    build: 
      context: https://github.com/nguyennhanduc-91/nextgen-meet-plugnmeet-server.git#main
      dockerfile: Dockerfile.nats
    container_name: nats-server
    networks:
      - coolify

  # 2. Cơ sở dữ liệu MariaDB (Giữ nguyên)
  plugnmeet-db:
    image: mariadb:10.11
    container_name: plugnmeet-db
    environment:
      MYSQL_ROOT_PASSWORD: "thanhnguyen_db_password"
      MYSQL_DATABASE: "plugnmeet"
    volumes:
      - plugnmeet_db_data:/var/lib/mysql
    networks:
      - coolify

  # 3. Backend API (Giữ nguyên)
  plugnmeet-server:
    build: 
      context: https://github.com/nguyennhanduc-91/nextgen-meet-plugnmeet-server.git#main
    container_name: plugnmeet-server
    depends_on:
      - nats-server
      - plugnmeet-db
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  plugnmeet_db_data:
