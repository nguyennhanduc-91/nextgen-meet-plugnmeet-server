version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: tn_root_secure_password_2026
      MYSQL_DATABASE: plugnmeet
      MYSQL_USER: tn_plugnmeet_user
      MYSQL_PASSWORD: tn_db_password_2026
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped

  # Container số 1: Copy file cấu hình từ source code vào Volume chung
  init-configs:
    image: alpine
    volumes:
      - ./:/source_code:ro # Mount toàn bộ source code từ Coolify vào đây (Chỉ đọc)
      - config-vol:/app-configs # Volume chung để chứa cấu hình
    command: >
      /bin/sh -c "
      cp /source_code/nats-server.conf /app-configs/nats-server.conf &&
      cp /source_code/config.yaml /app-configs/config.yaml &&
      echo 'Configs copied successfully!'
      "

  # Container số 2: Tải Frontend của hãng và giải nén vào Volume chung
  init-client-files:
    image: alpine
    volumes:
      - client-files:/client
    command: >
      /bin/sh -c "
      apk add --no-cache wget unzip &&
      wget -qO /tmp/client.zip https://github.com/mynaparrot/plugNmeet-client/releases/download/v2.1.7/plugnmeet-client.zip &&
      unzip -o /tmp/client.zip -d /tmp/ext &&
      cp -rf /tmp/ext/* /client/ &&
      echo \"window.PLUGNMEET_SERVER_URL = 'https://api-meet.thanhnguyen.group';\" > /client/config.js &&
      mkdir -p /client/assets/imgs &&
      echo \"window.PLUGNMEET_SERVER_URL = 'https://api-meet.thanhnguyen.group';\" > /client/assets/config.js &&
      wget -qO /client/assets/imgs/main-logo-dark.png 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true &&
      wget -qO /client/assets/imgs/main-logo-light.png 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true &&
      wget -qO /client/favicon.ico 'https://raw.githubusercontent.com/nguyennhanduc-91/nextgen-meet-frontend/main/ivekit-meet-open-graph.png' || true &&
      echo 'Client files downloaded successfully!'
      "

  nats:
    image: nats:2.12-alpine
    depends_on:
      init-configs:
        condition: service_completed_successfully
    command:
      - "-DVV"
      - "-config"
      - "/app-configs/nats-server.conf" # Đọc file cấu hình đã được copy vào Volume
    ports:
      - "4222:4222"
    volumes:
      - config-vol:/app-configs
      - nats-data:/data/jetstream
    restart: unless-stopped

  etherpad:
    image: mynaparrot/plugnmeet-etherpad
    restart: unless-stopped

  plugnmeet-server:
    image: mynaparrot/plugnmeet-server:v2.1.6
    depends_on:
      mariadb:
        condition: service_started
      nats:
        condition: service_started
      init-configs:
        condition: service_completed_successfully
      init-client-files:
        condition: service_completed_successfully
    volumes:
      - config-vol:/app-configs
      - plugnmeet-upload:/app/upload
      - client-files:/app/client/dist # Cung cấp Frontend files cho Backend
    command: ["plugnmeet-server", "-config", "/app-configs/config.yaml"] # Đọc config từ Volume
    environment:
      - LD_LIBRARY_PATH=/app/lib
    expose:
      - "8080"
    restart: unless-stopped

  plugnmeet-client:
    image: nginx:alpine
    depends_on:
      plugnmeet-server:
        condition: service_started
      init-client-files:
        condition: service_completed_successfully
    volumes:
      - client-files:/usr/share/nginx/html # Đọc Frontend files từ Volume
    command: >
      /bin/sh -c "
      echo 'server { 
        listen 80; 
        root /usr/share/nginx/html; 
        index index.html; 
        location / { 
          try_files \$$uri /index.html; 
        } 
        location /nats {
          proxy_pass http://nats:8222;
          proxy_http_version 1.1;
          proxy_set_header Upgrade \$$http_upgrade;
          proxy_set_header Connection \"Upgrade\";
          proxy_set_header Host \$$host;
        }
      }' > /etc/nginx/conf.d/default.conf &&
      nginx -g 'daemon off;'
      "
    expose:
      - "80"
    restart: unless-stopped

volumes:
  mariadb-data:
  nats-data:
  plugnmeet-upload:
  client-files:
  config-vol:
