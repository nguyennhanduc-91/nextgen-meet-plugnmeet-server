version: '3.8'
services:
  plugnmeet-db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: your_root_password
      MYSQL_DATABASE: plugnmeet
    volumes:
      - plugnmeet_db_data:/var/lib/mysql

  nats-server:
    image: nats:2.10-alpine
    command: "-c /etc/nats/nats.conf"
    # Bạn có thể dùng file nats_server_sample.conf của hãng làm mẫu

  plugnmeet-server:
    build: .
    depends_on:
      - plugnmeet-db
      - nats-server
    environment:
      - PLUGNMEET_CONFIG_PATH=/app/config.yaml
