version: '3.8'

services:
  # 1. Server NATS
  nats-server:
    build: 
      context: https://github.com/nguyennhanduc-91/nextgen-meet-plugnmeet-server.git#main
      dockerfile: Dockerfile.nats
    container_name: nats-server
    # Mở cổng nội bộ (Không xung đột máy vật lý)
    expose:
      - "8222"
      - "4222"
    # Ép Traefik chuyển hướng tên miền vào đúng cổng 8222
    labels:
      - "traefik.http.services.nats-server.loadbalancer.server.port=8222"
    networks:
      - coolify

  # 2. Cơ sở dữ liệu MariaDB
  plugnmeet-db:
    image: mariadb:10.11
    container_name: plugnmeet-db
    environment:
      MYSQL_ROOT_PASSWORD: "thanhnguyen_db_password"
      MYSQL_DATABASE: "plugnmeet"
    volumes:
      - plugnmeet_db_data:/var/lib/mysql
    networks:
      - coolify
 # ──────────────────────────────────────────────
  # 4. Etherpad (Shared Notepad / Ghi chú chung)
  # ──────────────────────────────────────────────
  etherpad:
    image: etherpad/etherpad:latest
    container_name: plugnmeet-etherpad
    environment:
      # ── Database (dùng chung MariaDB) ──
      DB_TYPE: "mysql"
      DB_HOST: "plugnmeet-db"
      DB_PORT: "3306"
      DB_NAME: "etherpad"
      DB_USER: "root"
      DB_PASS: "thanhnguyen_db_password"
      DB_CHARSET: "utf8mb4"
      # ── Bảo mật ──
      ADMIN_PASSWORD: "thanhnguyen_etherpad_admin"
      # ── Cấu hình cơ bản ──
      DEFAULT_PAD_TEXT: ""
      DISABLE_IP_LOGGING: "true"
      SOFFICE: null
    depends_on:
      - plugnmeet-db
    expose:
      - "9001"
    volumes:
      - plugnmeet_etherpad_data:/opt/etherpad-lite/var
    networks:
      - coolify
  # 3. Backend API
  plugnmeet-server:
    build: 
      context: https://github.com/nguyennhanduc-91/nextgen-meet-plugnmeet-server.git#main
    container_name: plugnmeet-server
    depends_on:
      - nats-server
      - plugnmeet-db
    # Mở cổng nội bộ 8080
    expose:
      - "8080"
    # Ép Traefik chuyển hướng tên miền vào đúng cổng 8080
    labels:
      - "traefik.http.services.plugnmeet-server.loadbalancer.server.port=8080"
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  plugnmeet_db_data:
