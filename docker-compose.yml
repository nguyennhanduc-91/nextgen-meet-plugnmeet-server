version: '3.8'

services:
  # 1. Server NATS
  nats-server:
    build: 
      context: https://github.com/nguyennhanduc-91/nextgen-meet-plugnmeet-server.git#main
      dockerfile: Dockerfile.nats
    container_name: nats-server
    # Mở cổng nội bộ (Không xung đột máy vật lý)
    expose:
      - "8222"
      - "4222"
    # Ép Traefik chuyển hướng tên miền vào đúng cổng 8222
    labels:
      - "traefik.http.services.nats-server.loadbalancer.server.port=8222"
    networks:
      - coolify

  # 2. Cơ sở dữ liệu MariaDB
  plugnmeet-db:
    image: mariadb:10.11
    container_name: plugnmeet-db
    environment:
      MYSQL_ROOT_PASSWORD: "thanhnguyen_db_password"
      MYSQL_DATABASE: "plugnmeet"
    volumes:
      - plugnmeet_db_data:/var/lib/mysql
    networks:
      - coolify

  # 3. Backend API
  plugnmeet-server:
    build: 
      context: https://github.com/nguyennhanduc-91/nextgen-meet-plugnmeet-server.git#main
    container_name: plugnmeet-server
    depends_on:
      - nats-server
      - plugnmeet-db
    # Mở cổng nội bộ 8080
    expose:
      - "8080"
    # Ép Traefik chuyển hướng tên miền vào đúng cổng 8080
    labels:
      - "traefik.http.services.plugnmeet-server.loadbalancer.server.port=8080"
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  plugnmeet_db_data:
